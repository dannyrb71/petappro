  #       working-directory: apps/mobile
  #       run: npm ci
  #     - name: Build + launch iOS sim
  #       working-directory: apps/mobile
  #       run: npx expo run:ios --configuration Release --simulator "iPhone 15"
  #     - name: Run Maestro flows
  #       run: |
